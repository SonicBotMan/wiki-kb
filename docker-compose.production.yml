# Wiki Brain — 生产环境 Docker Compose 配置
# 适用于 NAS/服务器部署，使用预构建镜像
# 使用方式: docker compose -f docker-compose.production.yml up -d

services:
  wiki-brain:
    image: wiki-wiki-brain
    container_name: wiki-brain
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8764}:8764"
    volumes:
      - ${WIKI_DATA:-/vol1/1000/wiki}:/data
      - ${WIKI_SCRIPTS:-/vol1/1000/wiki/scripts}:/app/scripts
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/scripts
      - PYTHONUNBUFFERED=1
    networks:
      - openviking_default
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8764)); s.close(); print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  openviking_default:
    external: true
