services:
  wiki-brain:
    image: wiki-wiki-brain
    container_name: wiki-brain
    restart: unless-stopped
    ports:
      - "8764:8764"
    volumes:
      - /vol1/1000/wiki:/data
      - /vol1/1000/wiki/scripts:/app/scripts
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/scripts
      - PYTHONUNBUFFERED=1
    networks:
      - openviking_default
    working_dir: /app
    command: python /app/scripts/wiki_mcp_server.py
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\",8764)); s.close(); print(\"ok\")"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  openviking_default:
    external: true
