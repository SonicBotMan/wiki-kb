<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780">
  <style>
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace; }
  </style>
  <defs>
    <marker id="arr-c" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arr-e" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arr-v" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb7185"/>
    </marker>
    <marker id="arr-s" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="780" fill="#020617"/>
  <rect width="1200" height="780" fill="url(#grid)"/>

  <!-- TITLE BAR -->
  <rect x="0" y="0" width="1200" height="52" fill="#0a1628"/>
  <text x="32" y="32" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.02em">Agent Memory System Landscape</text>
  <text x="32" y="46" font-size="10" fill="#64748b">Hierarchical Memory Architecture · Knowledge Flow · Tool Integration</text>
  <line x1="0" y1="52" x2="1200" y2="52" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>

  <!-- ===== AGENT (top center) ===== -->
  <rect x="460" y="68" width="280" height="56" rx="8" fill="#0c1824" stroke="#22d3ee" stroke-width="2"/>
  <text x="600" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#22d3ee">LLM / AI Agent</text>
  <text x="600" y="107" text-anchor="middle" font-size="10" fill="#64748b">Claude · GPT · GLM · Codex</text>

  <!-- ===== MEMORY SYSTEM BOX ===== -->
  <rect x="32" y="142" width="1136" height="400" rx="10" fill="#030d1f" stroke="#334155" stroke-width="1.5"/>
  <rect x="32" y="142" width="1136" height="34" rx="10" fill="#0c1824" stroke="#334155" stroke-width="1.5"/>
  <rect x="32" y="168" width="1136" height="8" fill="#0c1824"/>
  <text x="52" y="165" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="0.05em">MEMORY SYSTEM</text>

  <!-- === WORKING MEMORY (emerald) === -->
  <rect x="52" y="184" width="300" height="150" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="72" y="208" font-size="11" font-weight="600" fill="#34d399">Working Memory</text>
  <text x="272" y="208" text-anchor="end" font-size="9" fill="#475569">context window</text>

  <rect x="68" y="220" width="272" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="204" y="236" text-anchor="middle" font-size="10" fill="#94a3b8">Current conversation context</text>

  <rect x="68" y="252" width="272" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="204" y="268" text-anchor="middle" font-size="10" fill="#94a3b8">Retrieved memories (top-k)</text>

  <rect x="68" y="284" width="272" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="204" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">Active tool results</text>

  <text x="72" y="326" font-size="8" fill="#475569">ephemeral · context-length limited</text>

  <!-- Arrow: Working Memory → Agent -->
  <line x1="202" y1="184" x2="600" y2="124" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-e)"/>

  <!-- === PERSISTENT MEMORY (amber) === -->
  <rect x="372" y="184" width="300" height="150" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="392" y="208" font-size="11" font-weight="600" fill="#fbbf24">Persistent Memory</text>
  <text x="582" y="208" text-anchor="end" font-size="9" fill="#475569">session-scoped</text>

  <rect x="388" y="220" width="272" height="24" rx="4" fill="#1c1207" stroke="#fbbf24" stroke-width="1"/>
  <text x="524" y="236" text-anchor="middle" font-size="10" fill="#fbbf24">Session history (short-term)</text>

  <rect x="388" y="252" width="272" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="524" y="268" text-anchor="middle" font-size="10" fill="#94a3b8">Conversation summaries</text>

  <rect x="388" y="284" width="272" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="524" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">Key decisions · facts</text>

  <text x="392" y="326" font-size="8" fill="#475569">Redis / SQLite · bounded retention</text>

  <!-- Arrow: Persistent → Agent -->
  <line x1="522" y1="184" x2="600" y2="124" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-a)"/>

  <!-- === EPISODIC MEMORY (rose) === -->
  <rect x="692" y="184" width="240" height="150" rx="8" fill="#0f172a" stroke="#fb7185" stroke-width="1.5"/>
  <text x="712" y="208" font-size="11" font-weight="600" fill="#fb7185">Episodic Memory</text>
  <text x="852" y="208" text-anchor="end" font-size="9" fill="#475569">event-scoped</text>

  <rect x="708" y="220" width="212" height="24" rx="4" fill="#1c0a14" stroke="#fb7185" stroke-width="1"/>
  <text x="814" y="236" text-anchor="middle" font-size="10" fill="#fb7185">Events · actions taken</text>

  <rect x="708" y="252" width="212" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="814" y="268" text-anchor="middle" font-size="10" fill="#94a3b8">Timestamps · outcomes</text>

  <rect x="708" y="284" width="212" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="814" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">User preferences · patterns</text>

  <text x="712" y="326" font-size="8" fill="#475569">auto-archived · searchable</text>

  <!-- Arrow: Episodic → Agent -->
  <line x1="812" y1="184" x2="700" y2="124" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arr-r)"/>

  <!-- === PROCEDURAL MEMORY (slate) === -->
  <rect x="952" y="184" width="216" height="150" rx="8" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <text x="972" y="208" font-size="11" font-weight="600" fill="#94a3b8">Procedural Memory</text>
  <text x="1088" y="208" text-anchor="end" font-size="9" fill="#475569">skill-scoped</text>

  <rect x="968" y="220" width="188" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1062" y="236" text-anchor="middle" font-size="10" fill="#94a3b8">Built-in tools (file, terminal)</text>

  <rect x="968" y="252" width="188" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1062" y="268" text-anchor="middle" font-size="10" fill="#94a3b8">Installed Skills (~50)</text>

  <rect x="968" y="284" width="188" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1062" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">Slash commands</text>

  <text x="972" y="326" font-size="8" fill="#475569">static · loaded at startup</text>

  <!-- Arrow: Procedural → Agent -->
  <line x1="1060" y1="184" x2="700" y2="124" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-s)"/>

  <!-- === KNOWLEDGE BASE LAYER (violet) === -->
  <!-- Label row -->
  <text x="72" y="362" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.08em">KNOWLEDGE BASES</text>

  <!-- Wiki-KB (violet) - the star of the show -->
  <rect x="52" y="374" width="380" height="156" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
  <rect x="52" y="374" width="380" height="28" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <rect x="52" y="394" width="380" height="8" fill="#1e1b4b"/>
  <text x="72" y="392" font-size="12" font-weight="700" fill="#a78bfa">Wiki-KB</text>
  <text x="280" y="392" text-anchor="end" font-size="9" fill="#64748b">Structured Long-term Memory</text>

  <rect x="68" y="410" width="352" height="28" rx="4" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="244" y="429" text-anchor="middle" font-size="10" fill="#a78bfa">MCP Server · 11 Tools · Auto-indexed</text>

  <rect x="68" y="446" width="168" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="152" y="462" text-anchor="middle" font-size="9" fill="#94a3b8">9 content types</text>

  <rect x="244" y="446" width="176" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="332" y="462" text-anchor="middle" font-size="9" fill="#94a3b8">Entity Registry</text>

  <rect x="68" y="478" width="352" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="244" y="494" text-anchor="middle" font-size="9" fill="#94a3b8">Compiled Truth + Timeline · Git-versioned</text>

  <text x="72" y="522" font-size="8" fill="#475569">Markdown files · bind mount · Docker deployed</text>

  <!-- Arrow: Wiki-KB → Agent -->
  <line x1="242" y1="374" x2="600" y2="124" stroke="#a78bfa" stroke-width="2" marker-end="url(#arr-v)"/>

  <!-- OpenViking (orange) -->
  <rect x="452" y="374" width="300" height="156" rx="8" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="472" y="398" font-size="12" font-weight="600" fill="#fb923c">OpenViking</text>
  <text x="662" y="398" text-anchor="end" font-size="9" fill="#475569">Semantic Memory</text>

  <rect x="468" y="410" width="272" height="28" rx="4" fill="#1c1207" stroke="#fb923c" stroke-width="1"/>
  <text x="604" y="429" text-anchor="middle" font-size="10" fill="#fb923c">Vector embeddings · LLM summaries</text>

  <rect x="468" y="446" width="128" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="532" y="462" text-anchor="middle" font-size="9" fill="#94a3b8">Memories</text>

  <rect x="604" y="446" width="136" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="672" y="462" text-anchor="middle" font-size="9" fill="#94a3b8">Resources</text>

  <rect x="468" y="478" width="272" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="604" y="494" text-anchor="middle" font-size="9" fill="#94a3b8">viking:// URIs · full-text search</text>

  <text x="472" y="522" font-size="8" fill="#475569">REST API · session commit pipeline</text>

  <!-- Arrow: OpenViking → Agent -->
  <line x1="602" y1="374" x2="600" y2="124" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Notion (slate) - optional -->
  <rect x="772" y="374" width="240" height="156" rx="8" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <text x="792" y="398" font-size="12" font-weight="600" fill="#94a3b8">Notion</text>
  <text x="922" y="398" text-anchor="end" font-size="9" fill="#475569">optional</text>

  <rect x="788" y="410" width="212" height="28" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="894" y="429" text-anchor="middle" font-size="10" fill="#94a3b8">Read-only mirror</text>

  <rect x="788" y="446" width="212" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="894" y="462" text-anchor="middle" font-size="9" fill="#64748b">4 databases mapped</text>

  <rect x="788" y="478" width="212" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="894" y="494" text-anchor="middle" font-size="9" fill="#64748b">Entity · Concept · Comparison</text>

  <text x="792" y="522" font-size="8" fill="#475569">via wiki-to-notion.py · sync pipeline</text>

  <!-- Arrow: Notion → Agent (dashed) -->
  <line x1="892" y1="374" x2="700" y2="124" stroke="#64748b" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arr-s)"/>

  <!-- NAS WebDAV (slate) - bottom right -->
  <rect x="1032" y="374" width="136" height="156" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="1052" y="398" font-size="11" font-weight="600" fill="#64748b">NAS</text>
  <text x="1100" y="398" text-anchor="end" font-size="9" fill="#475569">backup</text>
  <rect x="1048" y="410" width="108" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1102" y="426" text-anchor="middle" font-size="9" fill="#64748b">WebDAV :5005</text>
  <rect x="1048" y="442" width="108" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1102" y="458" text-anchor="middle" font-size="9" fill="#64748b">Authoritative</text>
  <rect x="1048" y="474" width="108" height="24" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1102" y="490" text-anchor="middle" font-size="9" fill="#64748b">rsync mirror</text>
  <text x="1052" y="522" font-size="8" fill="#475569">/vol1/1000/wiki</text>

  <!-- ===== DATA FLOW LEGEND (bottom) ===== -->
  <rect x="32" y="548" width="1136" height="128" rx="10" fill="#030d1f" stroke="#334155" stroke-width="1.5"/>
  <rect x="32" y="548" width="1136" height="28" rx="10" fill="#0c1824" stroke="#334155" stroke-width="1.5"/>
  <rect x="32" y="568" width="1136" height="8" fill="#0c1824"/>
  <text x="52" y="566" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.06em">DATA FLOW</text>

  <!-- Flow description in 4 columns -->
  <!-- Column 1: Agent writes to Wiki -->
  <rect x="68" y="586" width="200" height="80" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="168" y="606" text-anchor="middle" font-size="10" font-weight="600" fill="#a78bfa">Agent → Wiki-KB</text>
  <text x="168" y="624" text-anchor="middle" font-size="9" fill="#475569">mcp_wiki_brain wiki_create</text>
  <text x="168" y="638" text-anchor="middle" font-size="9" fill="#475569">wiki_update · wiki_append_timeline</text>
  <text x="168" y="656" text-anchor="middle" font-size="8" fill="#64748b">Compiled Truth + Timeline</text>

  <!-- Arrow 1-2 -->
  <line x1="268" y1="626" x2="288" y2="626" stroke="#64748b" stroke-width="1" marker-end="url(#arr-s)"/>

  <!-- Column 2: Memory to Wiki -->
  <rect x="288" y="586" width="200" height="80" rx="6" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="388" y="606" text-anchor="middle" font-size="10" font-weight="600" fill="#fb923c">Memory → Wiki</text>
  <text x="388" y="624" text-anchor="middle" font-size="9" fill="#475569">memory_to_wiki.py (cron)</text>
  <text x="388" y="638" text-anchor="middle" font-size="9" fill="#475569">OV memories → wiki pages</text>
  <text x="388" y="656" text-anchor="middle" font-size="8" fill="#64748b">scheduled daily · 03:00</text>

  <!-- Arrow 2-3 -->
  <line x1="488" y1="626" x2="508" y2="626" stroke="#64748b" stroke-width="1" marker-end="url(#arr-s)"/>

  <!-- Column 3: Dream Cycle audit -->
  <rect x="508" y="586" width="200" height="80" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="608" y="606" text-anchor="middle" font-size="10" font-weight="600" fill="#fbbf24">Dream Cycle Audit</text>
  <text x="608" y="624" text-anchor="middle" font-size="9" fill="#475569">dream_cycle.py --apply (cron)</text>
  <text x="608" y="638" text-anchor="middle" font-size="9" fill="#475569">LLM detects contradictions</text>
  <text x="608" y="656" text-anchor="middle" font-size="8" fill="#64748b">scheduled daily · 03:10</text>

  <!-- Arrow 3-4 -->
  <line x1="708" y1="626" x2="728" y2="626" stroke="#64748b" stroke-width="1" marker-end="url(#arr-s)"/>

  <!-- Column 4: Auto Index -->
  <rect x="728" y="586" width="200" height="80" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="828" y="606" text-anchor="middle" font-size="10" font-weight="600" fill="#34d399">Auto Index</text>
  <text x="828" y="624" text-anchor="middle" font-size="9" fill="#475569">auto_index.py --sync (cron)</text>
  <text x="828" y="638" text-anchor="middle" font-size="9" fill="#475569">graph.json + OpenViking sync</text>
  <text x="828" y="656" text-anchor="middle" font-size="8" fill="#64748b">scheduled daily · 03:30</text>

  <!-- Arrow 4-5 -->
  <line x1="928" y1="626" x2="948" y2="626" stroke="#64748b" stroke-width="1" marker-end="url(#arr-s)"/>

  <!-- Column 5: Notion sync -->
  <rect x="948" y="586" width="200" height="80" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.5"/>
  <text x="1048" y="606" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">Notion Sync</text>
  <text x="1048" y="624" text-anchor="middle" font-size="9" fill="#475569">wiki-to-notion.py (manual)</text>
  <text x="1048" y="638" text-anchor="middle" font-size="9" fill="#475569">NAS WebDAV → Notion DBs</text>
  <text x="1048" y="656" text-anchor="middle" font-size="8" fill="#64748b">bidirectional · optional</text>

  <!-- ===== LEGEND (top right) ===== -->
  <rect x="960" y="66" width="210" height="66" rx="6" fill="#0a1628" stroke="#334155" stroke-width="1"/>
  <text x="976" y="88" font-size="9" font-weight="700" fill="#64748b" letter-spacing="0.08em">LEGEND</text>
  <line x1="976" y1="100" x2="998" y2="100" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1004" y="104" font-size="9" fill="#64748b">Wiki-KB (this project)</text>
  <line x1="976" y1="116" x2="998" y2="116" stroke="#fb923c" stroke-width="1.5"/>
  <text x="1004" y="120" font-size="9" fill="#64748b">OpenViking (semantic)</text>
  <line x1="976" y1="132" x2="998" y2="132" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1004" y="136" font-size="9" fill="#64748b">Optional / external</text>

</svg>
