  <text x="32" y="32" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.02em">Wiki-KB Internal Architecture</text>
  <text x="32" y="46" font-size="10" fill="#64748b" dy="4">MCP Server Components · Data Flow · Storage Layout · Safety Net</text>

  <!-- ===== MCP Client ===== -->
  <rect x="460" y="70" width="280" height="44" rx="22" fill="#0c1824" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="600" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#22d3ee">MCP Client (AI Agent)</text>
  <text x="600" y="112" text-anchor="middle" font-size="9" fill="#64748b">StreamableHTTP · :8764</text>

  <!-- Arrow: MCP Client → Server -->
  <line x1="600" y1="114" x2="600" y2="160" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)"/>

  <!-- ===== MCP SERVER BOX ===== -->
  <rect x="32" y="162" width="1136" height="380" rx="10" fill="#030d1f" stroke="#334155" stroke-width="1.5"/>
