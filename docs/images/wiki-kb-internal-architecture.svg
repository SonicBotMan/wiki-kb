<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" width="1200" height="860">
  <style>
    text { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace; }
  </style>
  <defs>
    <!-- Arrow markers -->
    <marker id="arr-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arr-emerald" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arr-rose" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb7185"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1200" height="860" fill="#020617"/>
  <rect width="1200" height="860" fill="url(#grid)"/>

  <!-- ===== TITLE BAR ===== -->
  <rect x="0" y="0" width="1200" height="52" fill="#0a1628"/>
  <text x="32" y="32" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.02em">Wiki-KB Internal Architecture</text>
  <text x="32" y="46" font-size="10" fill="#64748b" dy="4">MCP Server Components · Data Flow · Storage Layout</text>
  <line x1="0" y1="52" x2="1200" y2="52" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>

  <!-- ===== MCP CLIENT (top) ===== -->
  <rect x="460" y="70" width="280" height="44" rx="22" fill="#0c1824" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="600" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#22d3ee">MCP Client (AI Agent)</text>
  <text x="600" y="112" text-anchor="middle" font-size="9" fill="#64748b">StreamableHTTP · :8764</text>

  <!-- Arrow: Client → Server -->
  <line x1="600" y1="114" x2="600" y2="158" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-cyan)"/>

  <!-- ===== MCP SERVER BOX ===== -->
  <!-- Outer boundary -->
  <rect x="32" y="166" width="1136" height="310" rx="10" fill="#030d1f" stroke="#334155" stroke-width="1.5"/>
  <!-- Header strip -->
  <rect x="32" y="166" width="1136" height="34" rx="10" fill="#0c1824" stroke="#334155" stroke-width="1.5"/>
  <rect x="32" y="192" width="1136" height="8" fill="#0c1824"/>
  <line x1="32" y1="200" x2="1168" y2="200" stroke="#1e3a5f" stroke-width="1" opacity="0.6"/>
  <text x="52" y="189" font-size="13" font-weight="600" fill="#22d3ee">Wiki-KB MCP Server</text>
  <text x="52" y="203" font-size="10" fill="#475569">FastMCP · 11 Tools · Path traversal protection · 24h session</text>

  <!-- === 3 TOOL GROUP BOXES === -->

  <!-- GROUP 1: Wiki Operations (violet) -->
  <rect x="52" y="218" width="340" height="248" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="72" y="242" font-size="11" font-weight="600" fill="#a78bfa">Wiki Operations</text>
  <text x="218" y="242" text-anchor="end" font-size="9" fill="#475569">6 tools</text>

  <!-- Tool items: read (slate), write (emerald) -->
  <!-- wiki_search -->
  <rect x="68" y="254" width="312" height="30" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="224" y="273" text-anchor="middle" font-size="10" fill="#94a3b8">wiki_search(query, type)</text>

  <!-- wiki_get -->
  <rect x="68" y="292" width="312" height="30" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="224" y="311" text-anchor="middle" font-size="10" fill="#94a3b8">wiki_get(page_id)</text>

  <!-- wiki_create (write) -->
  <rect x="68" y="330" width="312" height="30" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="224" y="349" text-anchor="middle" font-size="10" fill="#34d399" font-weight="600">wiki_create(name, type, ...)</text>

  <!-- wiki_update (write) -->
  <rect x="68" y="368" width="312" height="30" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="224" y="387" text-anchor="middle" font-size="10" fill="#34d399" font-weight="600">wiki_update(page_id, section)</text>

  <!-- wiki_append_timeline (write) -->
  <rect x="68" y="406" width="312" height="30" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="224" y="425" text-anchor="middle" font-size="10" fill="#34d399" font-weight="600">wiki_append_timeline(page_id, event)</text>

  <!-- wiki_list -->
  <rect x="68" y="444" width="312" height="30" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="224" y="463" text-anchor="middle" font-size="10" fill="#94a3b8">wiki_list(type, status)</text>

  <!-- GROUP 2: Entity Registry (emerald) -->
  <rect x="410" y="218" width="340" height="248" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="430" y="242" font-size="11" font-weight="600" fill="#34d399">Entity Registry</text>
  <text x="580" y="242" text-anchor="end" font-size="9" fill="#475569">4 tools</text>

  <!-- entity_resolve -->
  <rect x="426" y="254" width="312" height="30" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="582" y="273" text-anchor="middle" font-size="10" fill="#94a3b8">entity_resolve(name)</text>

  <!-- entity_register -->
  <rect x="426" y="292" width="312" height="30" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="582" y="311" text-anchor="middle" font-size="10" fill="#34d399" font-weight="600">entity_register(name, type)</text>

  <!-- entity_list -->
  <rect x="426" y="330" width="312" height="30" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="582" y="349" text-anchor="middle" font-size="10" fill="#94a3b8">entity_list(type)</text>

  <!-- entity_merge (warning) -->
  <rect x="426" y="368" width="312" height="30" rx="4" fill="#1c1207" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="582" y="387" text-anchor="middle" font-size="10" fill="#fbbf24" font-weight="600">entity_merge(id1, id2)</text>

  <!-- Registry info -->
  <text x="442" y="426" font-size="9" fill="#475569">registry.json — unique IDs</text>
  <text x="442" y="440" font-size="9" fill="#475569">alias resolution · fuzzy match</text>
  <text x="442" y="454" font-size="9" fill="#475569">dedup detection (0.6+ sim)</text>

  <!-- Cross-link: wiki_create → entity_register -->
  <path d="M392,345 L410,345" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <text x="401" y="339" text-anchor="middle" font-size="8" fill="#fb923c">auto-reg</text>

  <!-- GROUP 3: Search + System (orange) -->
  <rect x="768" y="218" width="384" height="248" rx="8" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="788" y="242" font-size="11" font-weight="600" fill="#fb923c">Search &amp; System</text>
  <text x="1080" y="242" text-anchor="end" font-size="9" fill="#475569">1 tool</text>

  <!-- wiki_search (OpenViking) -->
  <rect x="784" y="254" width="356" height="52" rx="4" fill="#1c1207" stroke="#fb923c" stroke-width="1.5"/>
  <text x="962" y="274" text-anchor="middle" font-size="11" fill="#fb923c" font-weight="600">wiki_search()</text>
  <text x="962" y="291" text-anchor="middle" font-size="9" fill="#475569">OpenViking semantic → fallback file search</text>

  <!-- wiki_stats -->
  <rect x="784" y="314" width="356" height="30" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="962" y="333" text-anchor="middle" font-size="10" fill="#94a3b8">wiki_stats()</text>

  <!-- Internal modules -->
  <text x="800" y="374" font-size="9" fill="#64748b" font-weight="600" letter-spacing="0.05em">INTERNAL MODULES</text>
  <text x="800" y="392" font-size="10" fill="#94a3b8">wiki_config.py · centralized config</text>
  <text x="800" y="408" font-size="10" fill="#94a3b8">entity_registry.py · registry + aliases</text>
  <text x="800" y="424" font-size="10" fill="#94a3b8">Auth check · optional API key</text>
  <text x="800" y="440" font-size="10" fill="#94a3b8">Path validation · 24h session</text>
  <text x="800" y="456" font-size="10" fill="#94a3b8">yaml.safe_load() frontmatter parsing</text>

  <!-- Arrows: tool groups → storage (bottom) -->
  <line x1="222" y1="466" x2="222" y2="490" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-violet)"/>
  <line x1="580" y1="466" x2="580" y2="490" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-emerald)"/>

  <!-- Arrow: wiki_search → OpenViking (dashed external) -->
  <path d="M962,306 L962,326 L1100,326 L1100,490" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-cyan)"/>
  <rect x="1102" y="320" width="90" height="24" rx="4" fill="#030d1f" stroke="#22d3ee" stroke-width="1"/>
  <text x="1147" y="336" text-anchor="middle" font-size="10" fill="#22d3ee">OpenViking</text>

  <!-- ===== STORAGE LAYER ===== -->
  <rect x="32" y="498" width="1136" height="160" rx="10" fill="#030d1f" stroke="#334155" stroke-width="1.5"/>
  <rect x="32" y="498" width="1136" height="32" rx="10" fill="#0c1824" stroke="#334155" stroke-width="1.5"/>
  <rect x="32" y="522" width="1136" height="8" fill="#0c1824"/>
  <text x="52" y="518" font-size="12" font-weight="600" fill="#a78bfa" letter-spacing="0.06em">STORAGE</text>
  <text x="128" y="518" font-size="10" fill="#475569">./wiki (bind mount) → /data (container)</text>

  <!-- Pages -->
  <rect x="52" y="540" width="520" height="108" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="72" y="560" font-size="11" font-weight="600" fill="#a78bfa">Markdown Pages</text>
  <!-- Subdir boxes -->
  <rect x="72" y="570" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="112" y="585" text-anchor="middle" font-size="9" fill="#94a3b8">concepts/</text>
  <rect x="160" y="570" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="200" y="585" text-anchor="middle" font-size="9" fill="#94a3b8">entities/</text>
  <rect x="248" y="570" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="288" y="585" text-anchor="middle" font-size="9" fill="#94a3b8">people/</text>
  <rect x="336" y="570" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="376" y="585" text-anchor="middle" font-size="9" fill="#94a3b8">projects/</text>
  <rect x="424" y="570" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="464" y="585" text-anchor="middle" font-size="9" fill="#94a3b8">meetings/</text>
  <rect x="72" y="598" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="112" y="613" text-anchor="middle" font-size="9" fill="#94a3b8">ideas/</text>
  <rect x="160" y="598" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="200" y="613" text-anchor="middle" font-size="9" fill="#94a3b8">comparisons/</text>
  <rect x="248" y="598" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="288" y="613" text-anchor="middle" font-size="9" fill="#94a3b8">queries/</text>
  <rect x="336" y="598" width="80" height="22" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="376" y="613" text-anchor="middle" font-size="9" fill="#94a3b8">tools/</text>
  <text x="72" y="640" font-size="9" fill="#475569">SCHEMA v3 · Compiled Truth + Timeline · 9 types</text>

  <!-- Metadata -->
  <rect x="592" y="540" width="280" height="108" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1"/>
  <text x="612" y="560" font-size="11" font-weight="600" fill="#fbbf24">Metadata</text>
  <rect x="612" y="572" width="248" height="28" rx="4" fill="#1c1207" stroke="#fbbf24" stroke-width="1"/>
  <text x="736" y="591" text-anchor="middle" font-size="11" fill="#fbbf24">registry.json</text>
  <rect x="612" y="608" width="248" height="28" rx="4" fill="#1c1207" stroke="#a78bfa" stroke-width="1"/>
  <text x="736" y="627" text-anchor="middle" font-size="11" fill="#a78bfa">graph.json</text>

  <!-- Source Materials -->
  <rect x="892" y="540" width="276" height="108" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1"/>
  <text x="912" y="560" font-size="11" font-weight="600" fill="#94a3b8">Source Materials</text>
  <text x="912" y="576" font-size="9" fill="#475569">src/ · not indexed</text>
  <rect x="912" y="584" width="58" height="20" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="941" y="597" text-anchor="middle" font-size="8" fill="#64748b">images/</text>
  <rect x="976" y="584" width="58" height="20" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1005" y="597" text-anchor="middle" font-size="8" fill="#64748b">pdfs/</text>
  <rect x="1040" y="584" width="58" height="20" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1069" y="597" text-anchor="middle" font-size="8" fill="#64748b">articles/</text>
  <rect x="1104" y="584" width="52" height="20" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="1130" y="597" text-anchor="middle" font-size="8" fill="#64748b">audio/</text>
  <rect x="912" y="610" width="58" height="20" rx="3" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="941" y="623" text-anchor="middle" font-size="8" fill="#64748b">videos/</text>

  <!-- ===== AUTOMATION PIPELINE STRIP ===== -->
  <rect x="32" y="676" width="1136" height="100" rx="10" fill="#030d1f" stroke="#fb923c" stroke-width="1"/>
  <rect x="32" y="676" width="1136" height="28" rx="10" fill="#1c1207" stroke="#fb923c" stroke-width="1"/>
  <rect x="32" y="696" width="1136" height="8" fill="#1c1207"/>
  <text x="52" y="694" font-size="11" font-weight="600" fill="#fb923c" letter-spacing="0.06em">AUTOMATION PIPELINE</text>
  <text x="200" y="694" font-size="9" fill="#475569">cron scripts · scheduled tasks</text>

  <!-- 4 pipeline boxes -->
  <!-- auto_index -->
  <rect x="68" y="714" width="240" height="52" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="188" y="734" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">auto_index.py</text>
  <text x="188" y="750" text-anchor="middle" font-size="9" fill="#475569">graph.json + OpenViking sync</text>

  <!-- arrow -->
  <line x1="308" y1="740" x2="328" y2="740" stroke="#fb923c" stroke-width="1" marker-end="url(#arr-orange)"/>

  <!-- dream_cycle -->
  <rect x="328" y="714" width="240" height="52" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="448" y="734" text-anchor="middle" font-size="11" fill="#fbbf24" font-weight="600">dream_cycle.py</text>
  <text x="448" y="750" text-anchor="middle" font-size="9" fill="#475569">LLM audit · contradiction detection</text>

  <!-- arrow -->
  <line x1="568" y1="740" x2="588" y2="740" stroke="#fb923c" stroke-width="1" marker-end="url(#arr-orange)"/>

  <!-- memory_to_wiki -->
  <rect x="588" y="714" width="240" height="52" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="708" y="734" text-anchor="middle" font-size="11" fill="#34d399" font-weight="600">memory_to_wiki.py</text>
  <text x="708" y="750" text-anchor="middle" font-size="9" fill="#475569">OpenViking → Wiki sync</text>

  <!-- arrow -->
  <line x1="828" y1="740" x2="848" y2="740" stroke="#fb923c" stroke-width="1" marker-end="url(#arr-orange)"/>

  <!-- wiki-to-notion -->
  <rect x="848" y="714" width="240" height="52" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="968" y="734" text-anchor="middle" font-size="11" fill="#22d3ee" font-weight="600">wiki-to-notion.py</text>
  <text x="968" y="750" text-anchor="middle" font-size="9" fill="#475569">Wiki ↔ NAS ↔ Notion sync</text>

  <!-- ===== LEGEND ===== -->
  <rect x="960" y="68" width="200" height="84" rx="6" fill="#0a1628" stroke="#334155" stroke-width="1"/>
  <text x="976" y="88" font-size="9" font-weight="700" fill="#64748b" letter-spacing="0.08em">LEGEND</text>
  <rect x="976" y="98" width="12" height="12" rx="2" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="994" y="109" font-size="9" fill="#64748b">Write operation</text>
  <rect x="976" y="118" width="12" height="12" rx="2" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="994" y="129" font-size="9" fill="#64748b">Read / query</text>
  <line x1="976" y1="146" x2="998" y2="146" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1004" y="150" font-size="9" fill="#64748b">External (optional)</text>
  <line x1="976" y1="162" x2="998" y2="162" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1004" y="166" font-size="9" fill="#64748b">Internal link</text>

</svg>
