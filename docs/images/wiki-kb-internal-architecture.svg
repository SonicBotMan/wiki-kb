  <text x="892" y="234" font-size="11" font-weight="600" fill="#94a3b8">Internal Modules</text>

  <text x="892" y="260" font-size="9.5" fill="#94a3b8">wiki_config.py · centralized config</text>
  <text x="892" y="278" font-size="9.5" fill="#94a3b8">entity_registry.py · registry + aliases</text>
  <text x="892" y="296" font-size="9.5" fill="#94a3b8">_compute_body_hash() · SHA256</text>
  <text x="892" y="314" font-size="9.5" fill="#94a3b8">_git_init() / _git_commit()</text>
  <text x="892" y="332" font-size="9.5" fill="#94a3b8">_store_rejection() / _load_feedback()</text>
  <text x="892" y="350" font-size="9.5" fill="#94a3b8">_FileLock · atomic write safety</text>

  <text x="892" y="380" font-size="9" fill="#64748b" font-weight="600" letter-spacing="0.05em">SECURITY</text>
  <text x="892" y="398" font-size="9.5" fill="#94a3b8">Auth check · optional API key</text>
  <text x="892" y="414" font-size="9.5" fill="#94a3b8">Path validation · ALLOWED_SUBDIRS</text>
  <text x="892" y="430" font-size="9.5" fill="#94a3b8">24h session timeout</text>
  <text x="892" y="446" font-size="9.5" fill="#94a3b8">yaml.safe_load() frontmatter</text>

  <text x="892" y="476" font-size="9" fill="#64748b" font-weight="600" letter-spacing="0.05em">DATA FLOW</text>
  <text x="892" y="494" font-size="9.5" fill="#34d399">write → hash check → commit</text>
  <text x="892" y="510" font-size="9.5" fill="#fbbf24">review fail → store feedback</text>

