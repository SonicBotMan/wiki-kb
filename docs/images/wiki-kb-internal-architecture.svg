  <rect x="32" y="162" width="1136" height="34" rx="10" fill="#0c1824" stroke="#334155" stroke-width="1.5"/>
  <rect x="32" y="188" width="1136" height="8" fill="#0c1824"/>
  <text x="52" y="185" font-size="13" font-weight="600" fill="#22d3ee">Wiki-KB MCP Server</text>
  <text x="52" y="199" font-size="10" fill="#475569">FastMCP · 15 Tools · Path traversal protection · 24h session</text>

  <!-- ===== Wiki Operations (8 tools) ===== -->
  <rect x="52" y="210" width="250" height="320" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="72" y="234" font-size="11" font-weight="600" fill="#a78bfa">Wiki Operations</text>
  <text x="292" y="234" text-anchor="end" font-size="9" fill="#475569">8 tools</text>

  <rect x="68" y="246" width="218" height="26" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="177" y="263" text-anchor="middle" font-size="9.5" fill="#94a3b8">wiki_search(query, type)</text>

  <rect x="68" y="278" width="218" height="26" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="177" y="295" text-anchor="middle" font-size="9.5" fill="#94a3b8">wiki_get(page_id)</text>

  <rect x="68" y="310" width="218" height="26" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="177" y="327" text-anchor="middle" font-size="9.5" fill="#34d399" font-weight="600">wiki_create(name, type)</text>

  <rect x="68" y="342" width="218" height="26" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="177" y="359" text-anchor="middle" font-size="9.5" fill="#34d399" font-weight="600">wiki_update(page_id, section)</text>

  <rect x="68" y="374" width="218" height="26" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="177" y="391" text-anchor="middle" font-size="9.5" fill="#34d399" font-weight="600">wiki_append_timeline(event)</text>

  <rect x="68" y="406" width="218" height="26" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="177" y="423" text-anchor="middle" font-size="9.5" fill="#94a3b8">wiki_list(type, status)</text>

  <rect x="68" y="438" width="218" height="26" rx="4" fill="#1c1207" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="177" y="455" text-anchor="middle" font-size="9.5" fill="#fbbf24" font-weight="600">wiki_review(page_id)</text>

  <rect x="68" y="470" width="218" height="26" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="177" y="487" text-anchor="middle" font-size="9.5" fill="#94a3b8">wiki_health()</text>

