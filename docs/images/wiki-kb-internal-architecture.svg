  <text x="342" y="234" font-size="11" font-weight="600" fill="#34d399">Entity Registry</text>
  <text x="562" y="234" text-anchor="end" font-size="9" fill="#475569">4 tools</text>

  <rect x="338" y="246" width="218" height="26" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="447" y="263" text-anchor="middle" font-size="9.5" fill="#94a3b8">entity_resolve(name)</text>

  <rect x="338" y="278" width="218" height="26" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="447" y="295" text-anchor="middle" font-size="9.5" fill="#34d399" font-weight="600">entity_register(name, type)</text>

  <rect x="338" y="310" width="218" height="26" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="447" y="327" text-anchor="middle" font-size="9.5" fill="#94a3b8">entity_list(type)</text>

  <rect x="338" y="342" width="218" height="26" rx="4" fill="#1c1207" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="447" y="359" text-anchor="middle" font-size="9.5" fill="#fbbf24" font-weight="600">entity_merge(id1, id2)</text>

  <text x="354" y="390" font-size="9" fill="#475569">registry.json — unique IDs</text>
  <text x="354" y="406" font-size="9" fill="#475569">alias resolution · fuzzy match</text>
  <text x="354" y="422" font-size="9" fill="#475569">dedup detection (0.6+ sim)</text>

  <!-- ===== Safety Net (3 tools) — NEW ===== -->
  <rect x="592" y="210" width="260" height="200" rx="8" fill="#0f172a" stroke="#f87171" stroke-width="1.5"/>
  <text x="612" y="234" font-size="11" font-weight="600" fill="#f87171">🔒 Safety Net</text>
  <text x="842" y="234" text-anchor="end" font-size="9" fill="#475569">3 tools</text>

  <rect x="608" y="246" width="228" height="26" rx="4" fill="#052e16" stroke="#34d399" stroke-width="1.5"/>
  <text x="722" y="263" text-anchor="middle" font-size="9.5" fill="#34d399" font-weight="600">wiki_undo(n=1)</text>

  <rect x="608" y="278" width="228" height="26" rx="4" fill="#0c1824" stroke="#334155" stroke-width="1"/>
  <text x="722" y="295" text-anchor="middle" font-size="9.5" fill="#94a3b8">wiki_log(limit=10)</text>

