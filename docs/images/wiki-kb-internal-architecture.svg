<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" width="1200" height="960">
  <style>
    text { font-family: 'WenQuanYi Zen Hei', 'JetBrains Mono', 'SF Mono', 'Consolas', monospace; }
  </style>
  <defs>
